<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<style>
body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;padding:0 20px}
input,button{width:100%;padding:12px;margin:10px 0;border-radius:8px}
#qrcode{margin:20px 0}
</style>
</head>
<body>
<h1>QR Code Generator</h1>

<input type="text" id="txt" placeholder="Enter URL or text...">
<button onclick="gen()">Generate</button>
<div id="qrcode"></div>

<!-- 底部广告 -->
<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-你的ID" data-ad-slot="你的广告位ID" data-ad-format="auto"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({})</script>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script>
function gen(){
QRCode.toCanvas(document.getElementById('qrcode'), document.getElementById('txt').value, {width:240})
}
</script>
</body>
</html>
