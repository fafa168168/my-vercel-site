<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor - Free Online Tool</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;max-width:750px;margin:40px auto;padding:0 20px}
.box{border:1px solid #ddd;padding:24px;border-radius:12px;margin:20px 0}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc}
button{background:#007bff;color:white;border:none;cursor:pointer}
#result{margin-top:20px}
img{max-width:100%;border-radius:8px}
a{display:inline-block;padding:10px 16px;background:#28a745;color:white;text-decoration:none;border-radius:8px;margin-top:10px}
</style>
</head>
<body>
<h1>Image Compressor</h1>

<!-- 顶部 AdSense 广告位 -->
<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-你的ID" data-ad-slot="你的广告位ID" data-ad-format="auto"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({})</script>

<div class="box">
<input type="file" id="file" accept="image/*">
<button onclick="compress()">Compress Image</button>
<div id="result"></div>
</div>

<script>
function compress(){
const file=document.getElementById('file').files[0]
if(!file)return alert('Select an image')
const reader=new FileReader()
reader.onload=e=>{
const img=new Image()
img.src=e.target.result
img.onload=()=>{
const canvas=document.createElement('canvas')
const ctx=canvas.getContext('2d')
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
canvas.toBlob(b=>{
const url=URL.createObjectURL(b)
document.getElementById('result').innerHTML=`<img src="${url}"><br><a href="${url}" download="compressed.jpg">Download</a>`
},'image/jpeg',0.7)
}
}
reader.readAsDataURL(file)
}
</script>
</body>
</html>
